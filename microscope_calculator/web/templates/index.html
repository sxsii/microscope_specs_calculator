{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h1>Microscope Specimen Size Calculator</h1>

    <p class="subtitle">
        Calculate the real size of a specimen from microscope magnification.
    </p>

    <form method="POST"
          enctype="multipart/form-data">

        <label>Username</label>

        <input type="text"
               name="username"
               placeholder="Enter username"
               required>

        <label>Measured Size (mm)</label>

        <input type="number"
               step="0.01"
               name="measured_size"
               placeholder="e.g. 20"
               required>

        <label>Microscope Type</label>

        <select name="microscope_type">

            {% for microscope in microscopes %}

            <option value="{{ microscope }}">
                {{ microscope }}
            </option>

            {% endfor %}

        </select>

        <label>Output Unit</label>

        <select name="output_unit">

            <option value="nm">Nanometers (nm)</option>
            <option value="um">Micrometers (um)</option>
            <option value="mm">Millimeters (mm)</option>
            <option value="cm">Centimeters (cm)</option>
            <option value="m">Meters (m)</option>

        </select>

        <label>Upload Specimen Image</label>

        <input type="file"
               name="image"
               required>

        <button type="submit">
            Calculate Size
        </button>

    </form>

    {% if result %}

    <div class="result-box">

        <h2>Result</h2>

        <p>
            Real Specimen Size:
        </p>

        <div class="result-value">
            {{ result }}
        </div>

    </div>

    {% endif %}

</div>

{% endblock %}
